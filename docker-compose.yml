services:
  # ---------- REST (Spring Boot / Java) ----------
  rest-spring-boot:
    build:
      context: ./rest-spring-boot
      dockerfile: Dockerfile
    container_name: rest-spring-boot
    ports:
      - "8081:8081"
    networks:
      - bench
    environment:
      - SERVER_PORT=8081

  # ---------- gRPC (Spring Boot / Java) ----------
  grpc-spring-boot:
    build:
      context: ./grpc-spring-boot
      dockerfile: Dockerfile
    container_name: grpc-spring-boot
    ports:
      - "9091:9091"
    networks:
      - bench
    environment:
      - GRPC_SERVER_PORT=9091

  # ---------- REST (Node / Express) ----------
  rest-node:
    build:
      context: ./rest-node
      dockerfile: Dockerfile
    container_name: rest-node
    ports:
      - "3001:3001"
    networks:
      - bench
    environment:
      - PORT=3001

  # ---------- gRPC (Node) ----------
  grpc-node:
    build:
      context: ./grpc-node
      dockerfile: Dockerfile
    container_name: grpc-node
    ports:
      - "4001:4001"
    networks:
      - bench
    environment:
      - PORT=4001

  # ---------- k6 Load Tester ----------
  # Usage: docker compose run --rm k6 run -e BASE_URL=http://rest-spring-boot:8081 /scripts/rest_small.js
  # gRPC:  docker compose run --rm k6 run -e BASE_URL=grpc-spring-boot:9091 /scripts/grpc_small.js
  k6:
    image: grafana/k6:latest
    networks:
      - bench
    volumes:
      - ./k6:/scripts
    profiles:
      - k6

networks:
  bench:
    driver: bridge
