syntax = "proto3";
package bench.payload;

option java_multiple_files = true;
option java_package = "grgic.antonio.grpc_spring_boot.proto";
option java_outer_classname = "PayloadProto";

service PayloadService {
  rpc GetSmall  (Empty) returns (PayloadResponse);
  rpc GetMedium (Empty) returns (PayloadResponse);
  rpc GetLarge  (Empty) returns (PayloadResponse);
  rpc GetSmallStructured (Empty) returns (SmallPayload);
  rpc GetMediumStructured (Empty) returns (MediumPayload);
  rpc StreamSmall(ChunkRequest) returns (stream ChunkPayloadResponse);
  rpc StreamMedium(ChunkRequest) returns (stream ChunkPayloadResponse);
  rpc StreamLarge(ChunkRequest) returns (stream ChunkPayloadResponse);
}

message Empty {}

message SmallPayload {
  int32 id = 1;
  string protocol = 2;
  string service = 3;
  string payload_type = 4;
  string status = 5;
  bool fixed = 6;
}

message MediumPayloadItem {
  int32 id = 1;
  string value = 2;
}

message MediumPayload {
  string payload_type = 1;
  string description = 2;
  string unit = 3;
  repeated MediumPayloadItem items = 4;
  string pad = 5;
}

message PayloadResponse {
  bytes payload = 1;
}

message ChunkPayloadResponse {
  string payload_id = 1;
  int32 seq = 2;
  bytes data = 3;
  bool eof = 4;
}

message ChunkRequest {
  string payload_id = 1;
  int32 chunk_size = 2;
}
