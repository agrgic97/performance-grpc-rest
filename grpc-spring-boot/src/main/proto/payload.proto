syntax = "proto3";
package bench.payload;

option java_multiple_files = true;
option java_package = "grgic.antonio.grpc_codegen.proto";
option java_outer_classname = "PayloadProto";

service PayloadService {
  rpc GetSmall              (Empty) returns (SmallPayload);
  rpc GetMedium             (Empty) returns (MediumPayload);
  rpc GetLarge              (Empty) returns (LargePayload);
  rpc GetLargeCompressed    (Empty) returns (LargePayload);
  rpc StreamLarge           (Empty) returns (stream MediumPayload);
}

message Empty {}

enum StatusCode {
  UNKNOWN = 0;
  OK = 1;
  WARN = 2;
  ERROR = 3;
  PENDING = 4;
}

message SmallPayload {
  int32 int_val_1  = 1;
  int32 int_val_2  = 2;
  int32 int_val_3  = 3;
  int32 int_val_4  = 4;
  int32 int_val_5  = 5;
