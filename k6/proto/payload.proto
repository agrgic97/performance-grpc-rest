syntax = "proto3";
package bench.payload;

service PayloadService {
  rpc GetSmall              (Empty) returns (SmallPayload);
  rpc GetMedium             (Empty) returns (MediumPayload);
  rpc GetLarge              (Empty) returns (LargePayload);
  rpc GetLargeCompressed    (Empty) returns (LargePayload);
  rpc StreamLarge           (Empty) returns (stream MediumPayload);
}

message Empty {}

message SmallPayload {
  int32 id = 1;
  string protocol = 2;
  string service = 3;
  string payload_type = 4;
  string status = 5;
  bool fixed = 6;
}

message MediumPayload {
  string payload_type = 1;
  string description = 2;
  string unit = 3;
  repeated int64 items = 4;
}

message LargePayload {
  string payload_type = 1;
  string description = 2;
  string unit = 3;
  repeated MediumPayload items = 4;
}
